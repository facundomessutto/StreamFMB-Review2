{% extends 'base.html' %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="bg-panel p-4 p-md-5 border-start" style="border-left-color: #ff003c !important; border-left-width: 5px !important;">
            <h3 class="text-uppercase fw-light text-white mb-4">{{ accion }} <span class="fw-bold" style="color: #ff003c;">Obra</span></h3>
            
            {% if error %}
            <div class="alert alert-danger rounded-0 border-0 mb-4" style="background-color: #3a0000; color: #ff6b6b; font-weight: bold;">
                {{ error }}
            </div>
            {% endif %}
            
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="mb-3">
                    <label class="form-label text-secondary text-uppercase fw-bold" style="font-size: 0.8rem;">Título de la Obra</label>
                    <input type="text" name="titulo" class="form-control text-white" required 
                           style="background-color: #1a1a1a; border-color: #333;"
                           value="{{ contenido.titulo if contenido else '' }}">
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-secondary text-uppercase fw-bold" style="font-size: 0.8rem;">Formato</label>
                        <select name="tipo" class="form-select text-white" required style="background-color: #1a1a1a; border-color: #333;">
                            <option value="Pelicula" {% if contenido and contenido.tipo == 'Pelicula' %}selected{% endif %}>Película</option>
                            <option value="Serie" {% if contenido and contenido.tipo == 'Serie' %}selected{% endif %}>Serie</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-secondary text-uppercase fw-bold" style="font-size: 0.8rem;">Año de Estreno</label>
                        <input type="number" name="anio_estreno" class="form-control text-white" required 
                               min="1888" max="{{ anio_actual }}"
                               style="background-color: #1a1a1a; border-color: #333;"
                               value="{{ contenido.anio_estreno if contenido else '' }}">
                    </div>
                </div>

                <div class="mb-5">
                    <label class="form-label text-secondary text-uppercase fw-bold" style="font-size: 0.8rem;">Género Principal</label>
                    <input type="text" name="genero" class="form-control text-white" required placeholder="Ej: Drama, Acción, Terror"
                           style="background-color: #1a1a1a; border-color: #333;"
                           value="{{ contenido.genero if contenido else '' }}">
                </div>

                <div class="d-flex gap-3">
                    <button type="submit" class="btn text-white fw-bold text-uppercase flex-grow-1" style="background-color: #ff003c; border: none;">Guardar Datos</button>
                    <a href="/admin/dashboard" class="btn btn-outline-secondary rounded-0 text-uppercase fw-bold border-1">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
